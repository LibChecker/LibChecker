name: Android CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  APP_CENTER_SECRET: ${{secrets.APP_CENTER_SECRET}}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Test workflow scripts
        run: python3 -m unittest discover -s .github/scripts/tests -p 'test_*.py'
      - run: ./gradlew --non-interactive spotlessCheck

  build:
    name: Build (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: foss
            assemble_task: app:assembleFossRelease
            artifact_name: Foss
            apk_path: app/build/outputs/apk/foss/release
          - flavor: market
            assemble_task: app:assembleMarketRelease
            artifact_name: Market
            apk_path: app/build/outputs/apk/market/release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Detect dev version
        id: version-check
        run: |
          base_version=$(grep 'const val baseVersionName' build-logic/src/main/kotlin/Projects.kt | sed 's/.*"\(.*\)".*/\1/')
          if git tag -l "$base_version" | grep -q .; then
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write sign info
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master' && github.repository == 'LibChecker/LibChecker'
        run: |
          if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
            echo releaseStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo releaseKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo releaseKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo releaseStoreFile='${{ github.workspace }}/key.jks' >> gradle.properties
            echo ${{ secrets.SIGNING_KEY }} | base64 --decode > ${{ github.workspace }}/key.jks
          fi
      - name: Clean build
        if: steps.version-check.outputs.is_dev == 'false'
        run: ./gradlew --non-interactive clean
      - name: Build with Gradle
        run: ./gradlew --non-interactive ${{ matrix.assemble_task }}
      - name: Upload built APK
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.apk_path }}
      - name: Upload mappings
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/master' && matrix.flavor == 'market'
        uses: actions/upload-artifact@v7
        with:
          name: mappings
          path: "app/build/outputs/mapping/marketRelease"

  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'

    steps:
      - uses: actions/checkout@v7
      - name: Download Foss APK
        uses: actions/download-artifact@v8
        with:
          name: Foss
          path: artifacts/foss
      - name: Download Market APK
        uses: actions/download-artifact@v8
        with:
          name: Market
          path: artifacts/market
      - name: Set apk path
        id: apk-path
        run: |
          foss_path=$(find artifacts/foss -name '*.apk' -type f | head -1)
          echo "foss_path=$foss_path" >> $GITHUB_OUTPUT
          market_path=$(find artifacts/market -name '*.apk' -type f | head -1)
          echo "market_path=$market_path" >> $GITHUB_OUTPUT
      - name: Read APK info
        id: apk-info
        env:
          FOSS_FILE: ${{ steps.apk-path.outputs.foss_path }}
          MARKET_FILE: ${{ steps.apk-path.outputs.market_path }}
        run: python3 .github/scripts/read_apk_info.py
      - name: Build Telegram caption
        id: telegram-caption
        if: success() && github.ref == 'refs/heads/master'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: Snapshot apk is attached
          TELEGRAM_TEXT_LIMIT: 1024
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram
        if: success() && github.ref == 'refs/heads/master'
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MARKET_FILE: ${{ steps.apk-path.outputs.market_path }}
          TELEGRAM_CAPTION_JSON: ${{ steps.telegram-caption.outputs.json }}
        run: |
          MEDIA_JSON=$(python3 .github/scripts/build_telegram_payload.py --mode media-group)
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
            -F "chat_id=${CHANNEL_ID}" \
            -F "media=${MEDIA_JSON}" \
            -F marketRelease="@$MARKET_FILE"
      - name: Checkout assets ci branch
        uses: actions/checkout@v7
        with:
          repository: LibChecker/assets
          ref: ci
          path: assets-ci
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Update assets ci branch
        env:
          FOSS_FILE: ${{ github.workspace }}/${{ steps.apk-path.outputs.foss_path }}
          MARKET_FILE: ${{ github.workspace }}/${{ steps.apk-path.outputs.market_path }}
          APK_VERSION_NAME: ${{ steps.apk-info.outputs.version-name }}
          APK_VERSION_CODE: ${{ steps.apk-info.outputs.version-code }}
          MARKET_APK_VERSION_NAME: ${{ steps.apk-info.outputs.market-version-name }}
          MARKET_APK_VERSION_CODE: ${{ steps.apk-info.outputs.market-version-code }}
          BASE_VERSION_NAME: ${{ steps.apk-info.outputs.base-version-name }}
          FOSS_RELEASE_APK_FILE_NAME: LibChecker-${{ steps.apk-info.outputs.version-name }}-${{ steps.apk-info.outputs.version-code }}-foss-release.apk
          MARKET_RELEASE_APK_FILE_NAME: LibChecker-${{ steps.apk-info.outputs.market-version-name }}-${{ steps.apk-info.outputs.market-version-code }}-market-release.apk
          TARGET_SDK_VERSION: ${{ steps.apk-info.outputs.target-sdk-version }}
          MIN_SDK_VERSION: ${{ steps.apk-info.outputs.min-sdk-version }}
          COMPILE_SDK_VERSION: ${{ steps.apk-info.outputs.compile-sdk-version }}
          APK_FILE_SIZE: ${{ steps.apk-info.outputs.file-size }}
          MARKET_APK_FILE_SIZE: ${{ steps.apk-info.outputs.market-file-size }}
          IS_STABLE: ${{ steps.apk-info.outputs.is-stable }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd ${{ github.workspace }}/assets-ci

          cp -f "$FOSS_FILE" ./app-release.apk
          cp -f "$MARKET_FILE" ./app-market-release.apk
          python3 "${{ github.workspace }}/.github/scripts/write_assets_metadata.py" \
            --output ci.json \
            --version "$APK_VERSION_NAME" \
            --version-code "$APK_VERSION_CODE" \
            --target "$TARGET_SDK_VERSION" \
            --min "$MIN_SDK_VERSION" \
            --compile "$COMPILE_SDK_VERSION" \
            --package-size "$APK_FILE_SIZE" \
            --link "https://gh.absinthe.life/github.com/LibChecker/assets/raw/refs/heads/ci/app-release.apk" \
            --market-version "$MARKET_APK_VERSION_NAME" \
            --market-version-code "$MARKET_APK_VERSION_CODE" \
            --market-package-size "$MARKET_APK_FILE_SIZE" \
            --market-link "https://gh.absinthe.life/github.com/LibChecker/assets/raw/refs/heads/ci/app-market-release.apk"

          if [ "$IS_STABLE" = "true" ]; then
            python3 "${{ github.workspace }}/.github/scripts/write_assets_metadata.py" \
              --output stable.json \
              --version "$BASE_VERSION_NAME" \
              --version-code "$APK_VERSION_CODE" \
              --target "$TARGET_SDK_VERSION" \
              --min "$MIN_SDK_VERSION" \
              --compile "$COMPILE_SDK_VERSION" \
              --package-size "$APK_FILE_SIZE" \
              --link "https://gh.absinthe.life/github.com/LibChecker/LibChecker/releases/download/$BASE_VERSION_NAME/$FOSS_RELEASE_APK_FILE_NAME" \
              --note "https://github.com/LibChecker/LibChecker/releases" \
              --market-version "$BASE_VERSION_NAME" \
              --market-version-code "$MARKET_APK_VERSION_CODE" \
              --market-package-size "$MARKET_APK_FILE_SIZE" \
              --market-link "https://gh.absinthe.life/github.com/LibChecker/LibChecker/releases/download/$BASE_VERSION_NAME/$MARKET_RELEASE_APK_FILE_NAME"
          else
            python3 "${{ github.workspace }}/.github/scripts/sync_latest_stable_metadata.py" \
              --output stable.json \
              --target "$TARGET_SDK_VERSION" \
              --min "$MIN_SDK_VERSION" \
              --compile "$COMPILE_SDK_VERSION"
          fi

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app-release.apk app-market-release.apk ci.json stable.json
          if git diff --cached --quiet; then
            echo "No assets ci changes"
          else
            git commit -m "Update APK assets"
            git push origin HEAD:ci
          fi
      - name: Checkout assets main branch
        uses: actions/checkout@v7
        with:
          repository: LibChecker/assets
          ref: main
          path: assets-main
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0
      - name: Update assets main branch
        env:
          APK_VERSION_NAME: ${{ steps.apk-info.outputs.version-name }}
          APK_VERSION_CODE: ${{ steps.apk-info.outputs.version-code }}
          MARKET_APK_VERSION_NAME: ${{ steps.apk-info.outputs.market-version-name }}
          MARKET_APK_VERSION_CODE: ${{ steps.apk-info.outputs.market-version-code }}
          BASE_VERSION_NAME: ${{ steps.apk-info.outputs.base-version-name }}
          FOSS_RELEASE_APK_FILE_NAME: LibChecker-${{ steps.apk-info.outputs.version-name }}-${{ steps.apk-info.outputs.version-code }}-foss-release.apk
          MARKET_RELEASE_APK_FILE_NAME: LibChecker-${{ steps.apk-info.outputs.market-version-name }}-${{ steps.apk-info.outputs.market-version-code }}-market-release.apk
          TARGET_SDK_VERSION: ${{ steps.apk-info.outputs.target-sdk-version }}
          MIN_SDK_VERSION: ${{ steps.apk-info.outputs.min-sdk-version }}
          COMPILE_SDK_VERSION: ${{ steps.apk-info.outputs.compile-sdk-version }}
          APK_FILE_SIZE: ${{ steps.apk-info.outputs.file-size }}
          MARKET_APK_FILE_SIZE: ${{ steps.apk-info.outputs.market-file-size }}
          IS_STABLE: ${{ steps.apk-info.outputs.is-stable }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd ${{ github.workspace }}/assets-main

          python3 "${{ github.workspace }}/.github/scripts/write_assets_metadata.py" \
            --output ci.json \
            --version "$APK_VERSION_NAME" \
            --version-code "$APK_VERSION_CODE" \
            --target "$TARGET_SDK_VERSION" \
            --min "$MIN_SDK_VERSION" \
            --compile "$COMPILE_SDK_VERSION" \
            --package-size "$APK_FILE_SIZE" \
            --link "https://gh.absinthe.life/github.com/LibChecker/assets/raw/refs/heads/ci/app-release.apk" \
            --market-version "$MARKET_APK_VERSION_NAME" \
            --market-version-code "$MARKET_APK_VERSION_CODE" \
            --market-package-size "$MARKET_APK_FILE_SIZE" \
            --market-link "https://gh.absinthe.life/github.com/LibChecker/assets/raw/refs/heads/ci/app-market-release.apk"

          if [ "$IS_STABLE" = "true" ]; then
            python3 "${{ github.workspace }}/.github/scripts/write_assets_metadata.py" \
              --output stable.json \
              --version "$BASE_VERSION_NAME" \
              --version-code "$APK_VERSION_CODE" \
              --target "$TARGET_SDK_VERSION" \
              --min "$MIN_SDK_VERSION" \
              --compile "$COMPILE_SDK_VERSION" \
              --package-size "$APK_FILE_SIZE" \
              --link "https://gh.absinthe.life/github.com/LibChecker/LibChecker/releases/download/$BASE_VERSION_NAME/$FOSS_RELEASE_APK_FILE_NAME" \
              --note "https://github.com/LibChecker/LibChecker/releases" \
              --market-version "$BASE_VERSION_NAME" \
              --market-version-code "$MARKET_APK_VERSION_CODE" \
              --market-package-size "$MARKET_APK_FILE_SIZE" \
              --market-link "https://gh.absinthe.life/github.com/LibChecker/LibChecker/releases/download/$BASE_VERSION_NAME/$MARKET_RELEASE_APK_FILE_NAME"
          else
            python3 "${{ github.workspace }}/.github/scripts/sync_latest_stable_metadata.py" \
              --output stable.json \
              --target "$TARGET_SDK_VERSION" \
              --min "$MIN_SDK_VERSION" \
              --compile "$COMPILE_SDK_VERSION"
          fi

          if ! python3 "${{ github.workspace }}/.github/scripts/generate_apk_size_chart.py" \
            --repository . \
            --output apk-size-history-light.svg \
            --dark-output apk-size-history-dark.svg \
            --pending-commit "$GITHUB_SHA" \
            --pending-date "$(git -C "${{ github.workspace }}" show -s --format=%cs "$GITHUB_SHA")"; then
            echo "::warning::QuickChart unavailable; keeping previous APK size charts"
          fi

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ci.json stable.json
          for chart in apk-size-history-light.svg apk-size-history-dark.svg; do
            [ -f "$chart" ] && git add "$chart"
          done
          if git diff --cached --quiet; then
            echo "No assets main changes"
          else
            git commit -m "Update APK metadata"
            git push origin HEAD:main
          fi

  skipped:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v7
      - name: Build Telegram message
        id: telegram-message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: This push skipped building
          TELEGRAM_TEXT_LIMIT: 4096
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_MESSAGE_JSON: ${{ steps.telegram-message.outputs.json }}
        run: |
          PAYLOAD=$(python3 .github/scripts/build_telegram_payload.py --mode message)
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  cancelled:
    runs-on: ubuntu-latest
    if: ${{ false && cancelled() && github.repository == 'LibChecker/LibChecker' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [check, build]
    steps:
      - uses: actions/checkout@v7
      - name: Build Telegram message
        id: telegram-message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: This push cancelled building
          TELEGRAM_TEXT_LIMIT: 4096
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram if cancelled
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_MESSAGE_JSON: ${{ steps.telegram-message.outputs.json }}
        run: |
          PAYLOAD=$(python3 .github/scripts/build_telegram_payload.py --mode message)
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
