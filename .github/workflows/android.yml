name: Android CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:

env:
  APP_CENTER_SECRET: ${{secrets.APP_CENTER_SECRET}}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Skip duplicate actions
        uses: fkirc/skip-duplicate-actions@v5
        with:
          cancel_others: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Test Telegram notification script
        run: python3 .github/scripts/test_build_telegram_notification.py
      - run: ./gradlew --non-interactive spotlessCheck

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: Da25KUVSE5jbGds2zXmfXw==
      - name: Detect dev version
        id: version-check
        run: |
          base_version=$(grep 'const val baseVersionName' build-logic/src/main/kotlin/Projects.kt | sed 's/.*"\(.*\)".*/\1/')
          if git tag -l "$base_version" | grep -q .; then
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write sign info
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master' && github.repository == 'LibChecker/LibChecker'
        run: |
          if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
            echo releaseStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo releaseKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo releaseKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo releaseStoreFile='${{ github.workspace }}/key.jks' >> gradle.properties
            echo ${{ secrets.SIGNING_KEY }} | base64 --decode > ${{ github.workspace }}/key.jks
          fi
      - name: Clean build
        if: steps.version-check.outputs.is_dev == 'false'
        run: ./gradlew --non-interactive clean
      - name: Build with Gradle
        run: ./gradlew --non-interactive app:assembleRelease
      - name: Upload built Foss apk
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        uses: actions/upload-artifact@v7
        with:
          name: Foss
          path: ${{ github.workspace }}/app/build/outputs/apk/foss/release
      - name: Upload built Market apk
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        uses: actions/upload-artifact@v7
        with:
          name: Market
          path: ${{ github.workspace }}/app/build/outputs/apk/market/release
      - name: Upload mappings
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: mappings
          path: "app/build/outputs/mapping/marketRelease"
      - name: Set apk path
        id: apk-path
        run: |
          foss_path=$(find **/build/outputs/apk/foss -name '*.apk' -type f | head -1)
          echo "foss_path=$foss_path" >> $GITHUB_OUTPUT
          market_path=$(find **/build/outputs/apk/market -name '*.apk' -type f | head -1)
          echo "market_path=$market_path" >> $GITHUB_OUTPUT
      - name: Get apk info
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        id: apk-info
        uses: zhaobozhen/apk-info-action@v1.1.3
        with:
          apk-path: ${{ steps.apk-path.outputs.foss_path }}
      - name: Build Telegram caption
        id: telegram-caption
        if: success() && github.repository == 'LibChecker/LibChecker' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: Snapshot apk is attached
          TELEGRAM_TEXT_LIMIT: 1024
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram
        if: success() && github.repository == 'LibChecker/LibChecker' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MARKET_FILE: ${{ steps.apk-path.outputs.market_path }}
          TELEGRAM_CAPTION_JSON: ${{ steps.telegram-caption.outputs.json }}
        run: |
          MEDIA_JSON=$(python3 - <<'PY'
          import json
          import os

          print(json.dumps([{
            "type": "document",
            "media": "attach://marketRelease",
            "parse_mode": "HTML",
            "caption": json.loads(os.environ["TELEGRAM_CAPTION_JSON"])
          }], ensure_ascii=False))
          PY
          )
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
            -F "chat_id=${CHANNEL_ID}" \
            -F "media=${MEDIA_JSON}" \
            -F marketRelease="@$MARKET_FILE"
      - name: Checkout assets repository
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        uses: actions/checkout@v7
        with:
          repository: LibChecker/assets
          ref: ci
          path: assets-ci
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Commit and push artifacts to assets repo
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          FOSS_FILE: ${{ github.workspace }}/${{ steps.apk-path.outputs.foss_path }}
        run: |
          cd ${{ github.workspace }}/assets-ci
          
          # Copy artifacts to the repository
          cp -f $FOSS_FILE ./app-release.apk
          
          # Commit and push changes
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app-release.apk
          git commit -m "Add build artifacts"
          git push origin ci --force
      - name: Checkout assets repository (main branch)
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        uses: actions/checkout@v7
        with:
          repository: LibChecker/assets
          ref: main
          path: assets-main
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Create JSON file
        if: success() && github.event_name != 'pull_request' && github.repository == 'LibChecker/LibChecker'
        run: |
          cd ${{ github.workspace }}/assets-main

          echo '{
            "app": {
              "version": "${{ steps.apk-info.outputs.version-name }}",
              "versionCode": ${{steps.apk-info.outputs.version-code }},
              "extra": {
                "target": ${{steps.apk-info.outputs.target-sdk-version }},
                "min": ${{steps.apk-info.outputs.min-sdk-version }},
                "compile": ${{steps.apk-info.outputs.compile-sdk-version }},
                "packageSize": ${{ steps.apk-info.outputs.file-size }}
              },
              "link": "https://jsdelivr.b-cdn.net/gh/LibChecker/assets@ci/app-release.apk"
            }
          }' > ci.json

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ci.json
          git commit -m "Update ci.json"
          git push origin main --force

  skipped:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v7
      - name: Build Telegram message
        id: telegram-message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: This push skipped building
          TELEGRAM_TEXT_LIMIT: 4096
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_MESSAGE_JSON: ${{ steps.telegram-message.outputs.json }}
        run: |
          PAYLOAD=$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
            "chat_id": os.environ["CHANNEL_ID"],
            "parse_mode": "HTML",
            "text": json.loads(os.environ["TELEGRAM_MESSAGE_JSON"])
          }, ensure_ascii=False))
          PY
          )
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  cancelled:
    runs-on: ubuntu-latest
    if: ${{ false && cancelled() && github.repository == 'LibChecker/LibChecker' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
    needs: [check, build]
    steps:
      - uses: actions/checkout@v7
      - name: Build Telegram message
        id: telegram-message
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TELEGRAM_FOOTER: This push cancelled building
          TELEGRAM_TEXT_LIMIT: 4096
        run: python3 .github/scripts/build_telegram_notification.py
      - name: Send commit to telegram if cancelled
        env:
          CHANNEL_ID: ${{ secrets.TELEGRAM_TO }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_MESSAGE_JSON: ${{ steps.telegram-message.outputs.json }}
        run: |
          PAYLOAD=$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
            "chat_id": os.environ["CHANNEL_ID"],
            "parse_mode": "HTML",
            "text": json.loads(os.environ["TELEGRAM_MESSAGE_JSON"])
          }, ensure_ascii=False))
          PY
          )
          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
